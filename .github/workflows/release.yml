name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: loco-${{ github.ref_name }}-macos-arm.tar.gz
            platform: macos-arm
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: loco-${{ github.ref_name }}-linux-x86.tar.gz
            platform: linux-x86

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/loco install/loco
          tar czf dist/loco-${VERSION}-${{ matrix.platform }}.tar.gz -C install loco install.sh -C .. skills
          rm install/loco

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
